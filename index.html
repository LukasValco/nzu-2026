<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NZÚ 2026 — Znalostní báze</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green-50: #EAF3DE;
    --green-100: #C0DD97;
    --green-600: #3B6D11;
    --green-700: #27500A;
    --amber-50: #FAEEDA;
    --amber-100: #FAC775;
    --amber-600: #854F0B;
    --sidebar-w: 240px;
    --topbar-h: 52px;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  body {
    font-family: var(--font);
    font-size: 15px;
    line-height: 1.65;
    color: #1a1a1a;
    background: #f7f7f5;
  }

  /* ── Topbar ── */
  #topbar {
    position: fixed; top: 0; left: 0; right: 0; height: var(--topbar-h);
    background: #fff;
    border-bottom: 1px solid #e5e5e0;
    display: flex; align-items: center; gap: 12px;
    padding: 0 16px;
    z-index: 100;
  }
  #menu-btn {
    display: none; background: none; border: none; cursor: pointer;
    font-size: 22px; color: #555; padding: 4px;
  }
  .logo {
    display: flex; align-items: center; gap: 8px;
    font-weight: 600; font-size: 14px; color: var(--green-600);
    background: var(--green-50); border: 1px solid var(--green-100);
    padding: 5px 12px; border-radius: 6px; white-space: nowrap; text-decoration: none;
  }
  .logo svg { width: 16px; height: 16px; fill: var(--green-600); }
  #search-wrap {
    flex: 1; max-width: 420px; position: relative;
  }
  #search-wrap svg {
    position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
    width: 16px; height: 16px; fill: none; stroke: #888; stroke-width: 2;
    stroke-linecap: round; stroke-linejoin: round;
  }
  #search {
    width: 100%; padding: 7px 12px 7px 34px;
    border: 1px solid #ddd; border-radius: 8px;
    font-size: 13px; background: #f9f9f7;
    outline: none; color: #1a1a1a;
    transition: border-color .15s;
  }
  #search:focus { border-color: var(--green-100); background: #fff; }
  #search-results {
    display: none; position: absolute; top: calc(100% + 6px); left: 0; right: 0;
    background: #fff; border: 1px solid #e0e0da; border-radius: 8px;
    box-shadow: 0 4px 16px rgba(0,0,0,.08); max-height: 400px; overflow-y: auto;
    z-index: 200;
  }
  .sr-item {
    padding: 10px 14px; cursor: pointer; border-bottom: 1px solid #f0f0ea;
    transition: background .1s;
  }
  .sr-item:last-child { border-bottom: none; }
  .sr-item:hover { background: #f7f7f2; }
  .sr-item-title { font-weight: 500; font-size: 13px; color: #1a1a1a; }
  .sr-item-excerpt { font-size: 12px; color: #666; margin-top: 2px; line-height: 1.4; }
  mark { background: #FAEEDA; color: var(--amber-600); border-radius: 2px; padding: 0 1px; }
  #topbar-date { margin-left: auto; font-size: 11px; color: #999; white-space: nowrap; }

  /* ── Sidebar ── */
  #sidebar {
    position: fixed; top: var(--topbar-h); left: 0; bottom: 0;
    width: var(--sidebar-w);
    background: #fff; border-right: 1px solid #e5e5e0;
    overflow-y: auto; padding: 12px 8px 24px;
    z-index: 90;
    transition: transform .2s ease;
  }
  .nav-section-label {
    font-size: 10px; font-weight: 600; letter-spacing: .07em;
    text-transform: uppercase; color: #aaa;
    padding: 12px 10px 4px; margin-top: 4px;
  }
  .nav-section-label:first-child { padding-top: 4px; }
  .nav-btn {
    display: flex; align-items: center; gap: 9px;
    width: 100%; padding: 7px 10px; border-radius: 6px;
    border: none; background: none; cursor: pointer;
    font-size: 13px; font-family: var(--font); color: #444;
    text-align: left; transition: background .1s, color .1s;
  }
  .nav-btn svg { width: 16px; height: 16px; flex-shrink: 0; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
  .nav-btn:hover { background: #f5f5f0; color: #1a1a1a; }
  .nav-btn.active { background: var(--green-50); color: var(--green-600); font-weight: 500; }
  .nav-btn.active svg { stroke: var(--green-600); }

  /* ── Main ── */
  #main {
    margin-left: var(--sidebar-w);
    margin-top: var(--topbar-h);
    padding: 32px 40px 60px;
    min-height: calc(100vh - var(--topbar-h));
    max-width: 860px;
  }

  /* ── Content typography ── */
  #content h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; color: #111; }
  #content h2 { font-size: 17px; font-weight: 600; margin: 28px 0 10px; color: #1a1a1a; padding-bottom: 6px; border-bottom: 1px solid #ebebeb; }
  #content h3 { font-size: 15px; font-weight: 600; margin: 20px 0 8px; color: #222; }
  #content p { margin-bottom: 12px; color: #333; }
  #content ul, #content ol { margin: 8px 0 12px 20px; color: #333; }
  #content li { margin-bottom: 4px; }
  #content blockquote {
    margin: 0 0 16px; padding: 10px 14px;
    border-left: 3px solid var(--green-100);
    background: var(--green-50); border-radius: 0 6px 6px 0;
    font-size: 13px; color: #555;
  }
  #content blockquote p { margin: 0; }
  #content strong { font-weight: 600; color: #111; }
  #content code {
    background: #f0f0ea; padding: 1px 5px; border-radius: 4px;
    font-size: 13px; font-family: 'SF Mono', Consolas, monospace;
  }
  #content pre { background: #f5f5f0; padding: 14px 16px; border-radius: 8px; overflow-x: auto; margin-bottom: 16px; }
  #content pre code { background: none; padding: 0; }
  #content hr { border: none; border-top: 1px solid #ebebeb; margin: 24px 0; }
  #content a { color: var(--green-600); text-decoration: underline; text-underline-offset: 2px; }
  #content a:hover { color: var(--green-700); }

  /* Tables */
  #content table {
    width: 100%; border-collapse: collapse; margin: 12px 0 20px;
    font-size: 13px; border-radius: 8px; overflow: hidden;
    border: 1px solid #e5e5e0;
  }
  #content th {
    background: #f5f5f0; text-align: left;
    padding: 8px 12px; font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: .05em; color: #666;
    border-bottom: 1px solid #e0e0da;
  }
  #content td { padding: 8px 12px; border-bottom: 1px solid #f0f0ea; vertical-align: top; }
  #content tr:last-child td { border-bottom: none; }
  #content tr:hover td { background: #fcfcfa; }

  /* Content meta */
  .content-meta {
    font-size: 12px; color: #888; margin-bottom: 20px;
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  }
  .warn-badge {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 11px; padding: 2px 8px; border-radius: 4px;
    background: var(--amber-50); color: var(--amber-600);
    border: 1px solid var(--amber-100); font-weight: 500;
  }

  /* ⚠ warning spans inside content */
  #content .warn-inline {
    display: inline-flex; align-items: center; gap: 3px;
    background: var(--amber-50); color: var(--amber-600);
    border: 1px solid var(--amber-100);
    border-radius: 4px; padding: 1px 6px; font-size: 12px; font-weight: 500;
  }

  /* FAQ accordion */
  .faq-section { margin: 24px 0; }
  .faq-group-title {
    font-size: 13px; font-weight: 600; text-transform: uppercase;
    letter-spacing: .06em; color: #888;
    margin: 20px 0 8px; padding-bottom: 4px;
    border-bottom: 1px solid #ebebeb;
  }
  .faq-item { border: 1px solid #e5e5e0; border-radius: 8px; margin-bottom: 6px; overflow: hidden; }
  .faq-q {
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 11px 14px; font-size: 13px; font-weight: 500;
    cursor: pointer; background: #fafaf8; gap: 12px;
    transition: background .1s; border: none; width: 100%; text-align: left;
    font-family: var(--font); color: #1a1a1a;
  }
  .faq-q:hover { background: #f5f5f0; }
  .faq-q.open { background: var(--green-50); color: var(--green-600); }
  .faq-chevron { flex-shrink: 0; transition: transform .2s; font-size: 16px; color: #aaa; margin-top: 1px; }
  .faq-q.open .faq-chevron { transform: rotate(180deg); color: var(--green-600); }
  .faq-a {
    display: none; padding: 12px 14px;
    font-size: 13px; color: #444; line-height: 1.65;
    background: #fff; border-top: 1px solid #e5e5e0;
  }
  .faq-a.open { display: block; }
  .faq-a p { margin: 0; }
  .faq-a strong { color: #111; }

  /* Update banner */
  #update-banner {
    display: flex; align-items: center; gap: 8px;
    background: var(--green-50); border: 1px solid var(--green-100);
    border-radius: 8px; padding: 9px 14px; margin-bottom: 20px;
    font-size: 12px; color: var(--green-600);
  }
  #update-banner svg { width: 14px; height: 14px; flex-shrink: 0; }

  /* Loading / error */
  #loading {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 200px; color: #888; gap: 12px;
  }
  .spinner {
    width: 24px; height: 24px; border: 2px solid #e0e0da;
    border-top-color: var(--green-600); border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Overlay for mobile */
  #overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 85;
  }

  /* Responsive */
  @media (max-width: 720px) {
    #sidebar { transform: translateX(-100%); }
    #sidebar.open { transform: translateX(0); }
    #overlay.open { display: block; }
    #main { margin-left: 0; padding: 20px 16px 48px; }
    #menu-btn { display: block; }
    #topbar-date { display: none; }
  }

  /* Print */
  @media print {
    #topbar, #sidebar, #overlay { display: none; }
    #main { margin: 0; padding: 20px; max-width: none; }
  }
</style>
</head>

<script>
// ── Config ──────────────────────────────────────────────────────────────────
const CONTENT_BASE = 'content/';
const PAGES = [
  '00_prehled_programu','01_nzu_light','02_uver_rodinne_domy',
  '03_uver_bytove_domy','04_castky_a_parametry','05_proces_zadosti_a_dokumenty',
  '06_zpusobilost_kombinace_terminy','07_renovacni_pas_poradenstvi',
  '08_faq','09_pojmy_zkratky','10_zdroje'
];
const PAGE_LABELS = {
  '00_prehled_programu': 'Přehled programu',
  '01_nzu_light': 'NZÚ Light',
  '02_uver_rodinne_domy': 'Úvěr — rodinné domy',
  '03_uver_bytove_domy': 'Úvěr — bytové domy',
  '04_castky_a_parametry': 'Částky a parametry',
  '05_proces_zadosti_a_dokumenty': 'Proces a dokumenty',
  '06_zpusobilost_kombinace_terminy': 'Způsobilost a termíny',
  '07_renovacni_pas_poradenstvi': 'Renovační pas',
  '08_faq': 'FAQ',
  '09_pojmy_zkratky': 'Pojmy a zkratky',
  '10_zdroje': 'Zdroje'
};

// ── State ───────────────────────────────────────────────────────────────────
const cache = {};
let currentPage = '00_prehled_programu';
let allText = {};

// ── Markdown pre-processing ──────────────────────────────────────────────────
function preprocess(md) {
  // Convert [[file_id]] cross-references to links
  md = md.replace(/\[\[(\w+)\]\]/g, (_, id) => {
    const label = PAGE_LABELS[id] || id;
    return `[${label}](#${id})`;
  });
  // Wrap ⚠ lines with warning styling (inline HTML)
  md = md.replace(/(⚠[^\n]*)/g, '<span class="warn-inline">$1</span>');
  return md;
}

// ── Fetch & cache ────────────────────────────────────────────────────────────
async function fetchPage(id) {
  if (cache[id]) return cache[id];
  const res = await fetch(`${CONTENT_BASE}${id}.md`);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const text = await res.text();
  cache[id] = text;
  allText[id] = text;
  return text;
}

// ── Render ───────────────────────────────────────────────────────────────────
function extractMeta(md) {
  const match = md.match(/^>\s*(.+?)$/m);
  return match ? match[1] : '';
}

function renderFAQ(md) {
  const lines = md.split('\n');
  let html = '<div class="faq-section">';
  let inFaq = false;
  let currentGroup = '';

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];

    if (line.startsWith('# ')) {
      // Page title — skip (rendered separately)
      continue;
    }
    if (line.startsWith('> ')) {
      // blockquote metadata — skip in FAQ
      continue;
    }
    if (line.startsWith('## ')) {
      if (currentGroup) html += '</div>';
      currentGroup = line.replace('## ', '').replace(/\*\*/g, '');
      html += `<div class="faq-group"><div class="faq-group-title">${currentGroup}</div>`;
      inFaq = true;
      continue;
    }
    if (line.startsWith('---')) continue;

    if (inFaq && line.startsWith('**') && line.endsWith('**')) {
      const question = line.slice(2, -2);
      // Collect answer lines
      const answerLines = [];
      let j = i + 1;
      while (j < lines.length && !lines[j].startsWith('**') && !lines[j].startsWith('## ') && !lines[j].startsWith('---')) {
        if (lines[j].trim()) answerLines.push(lines[j]);
        j++;
      }
      i = j - 1;
      const answerRaw = answerLines.join(' ').trim();
      const answerHtml = answerRaw
        .replace(/⚠[^\n]*/g, m => `<span class="warn-inline">${m}</span>`)
        .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      html += `<div class="faq-item">
        <button class="faq-q" onclick="toggleFaq(this)">
          <span>${question.replace(/⚠[^\n]*/g, m => `<span class="warn-inline">${m}</span>`)}</span>
          <span class="faq-chevron">&#8964;</span>
        </button>
        <div class="faq-a"><p>${answerHtml}</p></div>
      </div>`;
    }
  }
  if (currentGroup) html += '</div>';
  html += '</div>';
  return html;
}

function toggleFaq(btn) {
  btn.classList.toggle('open');
  const answer = btn.nextElementSibling;
  answer.classList.toggle('open');
}

async function navigate(id, pushState = true) {
  currentPage = id;

  // Update nav
  document.querySelectorAll('.nav-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.page === id);
  });

  // Update URL hash
  if (pushState) history.pushState({page: id}, '', `#${id}`);

  // Close mobile sidebar
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');

  // Show loading
  const contentEl = document.getElementById('content');
  contentEl.innerHTML = '<div id="loading"><div class="spinner"></div><span>Načítám obsah…</span></div>';

  try {
    const md = await fetchPage(id);
    const meta = extractMeta(md);
    const title = (md.match(/^#\s+(.+)$/m) || [])[1] || PAGE_LABELS[id];
    document.title = `${PAGE_LABELS[id]} — NZÚ 2026`;

    // Detect warning in meta
    const hasWarn = md.includes('⚠') || md.toLowerCase().includes('může se měnit');
    const warnBadge = hasWarn ? `<span class="warn-badge">⚠ Může se měnit</span>` : '';

    const metaHtml = meta
      ? `<div class="content-meta">${meta.replace(/\[\[(\w+)\]\]/g, (_, pid) => `<a href="#${pid}" onclick="navigate('${pid}');return false;">${PAGE_LABELS[pid]||pid}</a>`)} ${warnBadge}</div>`
      : '';

    let bodyHtml;
    if (id === '08_faq') {
      bodyHtml = renderFAQ(md);
    } else {
      const processed = preprocess(md);
      bodyHtml = marked.parse(processed);
    }

    // Fix cross-ref links in rendered HTML
    const finalHtml = bodyHtml.replace(/href="#(\w+)"/g, (_, pid) => {
      if (PAGES.includes(pid)) return `href="#${pid}" onclick="navigate('${pid}');return false;"`;
      return `href="#${pid}"`;
    });

    contentEl.innerHTML = metaHtml + finalHtml;

    // Scroll to top
    window.scrollTo(0, 0);

  } catch (e) {
    contentEl.innerHTML = `<p style="color:#c0392b">Chyba při načítání obsahu: ${e.message}</p>
    <p style="color:#888;font-size:13px;">Zkontrolujte, že soubor <code>content/${id}.md</code> existuje.</p>`;
  }
}

// ── Search ───────────────────────────────────────────────────────────────────
async function preloadAll() {
  for (const id of PAGES) {
    fetchPage(id).catch(() => {});
  }
}

function stripMd(text) {
  return text
    .replace(/^#+\s+/gm, '')
    .replace(/\*\*([^*]+)\*\*/g, '$1')
    .replace(/\*([^*]+)\*/g, '$1')
    .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')
    .replace(/\[\[(\w+)\]\]/g, PAGE_LABELS['$1'] || '$1')
    .replace(/^>\s*/gm, '')
    .replace(/---/g, '')
    .replace(/\n{3,}/g, '\n\n')
    .trim();
}

function highlightText(text, query) {
  const re = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
  return text.replace(re, '<mark>$1</mark>');
}

function doSearch(query) {
  const resultsEl = document.getElementById('search-results');
  if (!query || query.length < 2) { resultsEl.style.display = 'none'; return; }

  const q = query.toLowerCase();
  const results = [];

  for (const [id, text] of Object.entries(allText)) {
    const plain = stripMd(text).toLowerCase();
    const idx = plain.indexOf(q);
    if (idx === -1) continue;

    const title = (text.match(/^#\s+(.+)$/m) || [])[1] || PAGE_LABELS[id];
    const start = Math.max(0, idx - 60);
    const excerpt = stripMd(text).slice(start, start + 140).replace(/\n/g, ' ');

    results.push({ id, title: PAGE_LABELS[id], excerpt, score: idx === 0 ? 0 : 1 });
  }

  if (results.length === 0) {
    resultsEl.innerHTML = `<div class="sr-item"><div class="sr-item-excerpt">Žádné výsledky pro „${query}"</div></div>`;
  } else {
    resultsEl.innerHTML = results.slice(0, 8).map(r => `
      <div class="sr-item" onclick="navigate('${r.id}');document.getElementById('search').value='';document.getElementById('search-results').style.display='none';">
        <div class="sr-item-title">${highlightText(r.title, query)}</div>
        <div class="sr-item-excerpt">…${highlightText(r.excerpt, query)}…</div>
      </div>`).join('');
  }
  resultsEl.style.display = 'block';
}

// ── Date ─────────────────────────────────────────────────────────────────────
function setDate() {
  const d = new Date();
  const opts = { day: 'numeric', month: 'long', year: 'numeric' };
  document.getElementById('topbar-date').textContent =
    'Poslední návštěva: ' + d.toLocaleDateString('cs-CZ', opts);
}

// ── Init ─────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  // Mobile menu
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('overlay');
  document.getElementById('menu-btn').addEventListener('click', () => {
    sidebar.classList.toggle('open');
    overlay.classList.toggle('open');
  });
  overlay.addEventListener('click', () => {
    sidebar.classList.remove('open');
    overlay.classList.remove('open');
  });

  // Nav buttons
  document.querySelectorAll('.nav-btn[data-page]').forEach(btn => {
    btn.addEventListener('click', () => navigate(btn.dataset.page));
  });

  // Search
  const searchEl = document.getElementById('search');
  let searchTimer;
  searchEl.addEventListener('input', e => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => doSearch(e.target.value), 200);
  });
  searchEl.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      searchEl.value = '';
      document.getElementById('search-results').style.display = 'none';
    }
  });
  document.addEventListener('click', e => {
    if (!e.target.closest('#search-wrap'))
      document.getElementById('search-results').style.display = 'none';
  });

  // Hash routing
  const hash = location.hash.replace('#', '') || '00_prehled_programu';
  const startPage = PAGES.includes(hash) ? hash : '00_prehled_programu';

  // Set date
  setDate();

  // Navigate to start page
  navigate(startPage, false);

  // Preload all pages for search
  preloadAll();
});

window.addEventListener('popstate', e => {
  if (e.state && e.state.page) navigate(e.state.page, false);
});

// Expose for inline onclick
window.navigate = navigate;
window.toggleFaq = toggleFaq;
</script>
</body>
</html>
